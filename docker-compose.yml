x-app-build: &app-build
    build:
        context: ./vendor/laravel/sail/runtimes/8.4
        dockerfile: Dockerfile
        args:
            WWWGROUP: '${WWWGROUP:-1000}'
    image: sail-8.4/app

services:
    laravel.test:
        <<: *app-build
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            mariadb:
                condition: service_healthy
            redis:
                condition: service_started

    mariadb:
        image: 'mariadb:10'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        volumes:
            - 'sail-mariadb:/var/lib/mysql'
            # In-repo copy: mounting vendor/... breaks on some Docker Desktop + WSL setups
            - './docker/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s

    redis:
        image: 'redis:7-alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        networks:
            - sail

    queue:
        <<: *app-build
        command: php /var/www/html/artisan queue:work redis --sleep=3 --tries=3
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - redis
            - mariadb

    scheduler:
        <<: *app-build
        command: php /var/www/html/artisan schedule:work
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mariadb

    printer-bridge:
        build:
            context: .
            dockerfile: infra/docker/printer-bridge/Dockerfile
        ports:
            - '${FORWARD_PRINTER_BRIDGE_9100:-9100}:9100'
            - '${FORWARD_PRINTER_BRIDGE_9101:-9101}:9101'
        networks:
            - sail

networks:
    sail:
        driver: bridge

volumes:
    sail-mariadb:
        driver: local
